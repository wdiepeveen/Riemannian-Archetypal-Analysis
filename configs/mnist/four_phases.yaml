base_results_dir: "results/mnist/four_phases"

experiments:
  mnist_8:
    data:
      size: 8
      batch_size: 128
      mnist_mean: 0.1307
      mnist_var: 0.3081
      train_val_split: 0.8
      sigma: 1.0e-2

    model:
      latent_dim: 10

    phase_1:
      enabled: true
      num_epochs: 10          
      learning_rate: 1.0e-3  
      reg_param: 1.0e-2 
      hidden_dim: 20     
      checkpoint_subdir: "checkpoints_phase_1"

    phase_2:
      enabled: false
      num_epochs: 50         
      learning_rate: 1.0e-2  
      reg_param: 1.0e-4                
      in_channels: 1
      squeeze_factor: 2
      kernel_size: 3
      hidden_channels: 32
      n_flows: 6
      checkpoint_subdir: "checkpoints_phase_2"

    phase_3:
      enabled: false
      num_epochs: 50
      learning_rate: 1.0e-2
      num_radials: 10
      checkpoint_subdir: "checkpoints_phase_3"

    phase_4:
      enabled: false
      num_epochs: 50
      learning_rate: 1.0e-3
      checkpoint_subdir: "checkpoints_phase_4"

  mnist_16:
    data:
      size: 16
      batch_size: 128
      mnist_mean: 0.1307
      mnist_var: 0.3081
      train_val_split: 0.8
      sigma: 1.0e-2

    model:
      latent_dim: 20

    phase_1:
      enabled: true
      num_epochs: 10
      learning_rate: 1.0e-3
      reg_param: 1.0e-2
      hidden_dim: 20
      checkpoint_subdir: "checkpoints_phase_1"

    phase_2:
      enabled: true
      num_epochs: 50
      learning_rate: 1.0e-3
      reg_param: 0.0
      in_channels: 1
      squeeze_factor: 4
      kernel_size: 3
      hidden_channels: 128
      n_flows: 8
      checkpoint_subdir: "checkpoints_phase_2"

    phase_3:
      enabled: false
      num_epochs: 50
      learning_rate: 1.0e-2
      num_radials: 10
      checkpoint_subdir: "checkpoints_phase_3"

    phase_4:
      enabled: false
      num_epochs: 50
      learning_rate: 1.0e-3
      checkpoint_subdir: "checkpoints_phase_4"
