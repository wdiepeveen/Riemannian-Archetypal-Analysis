base_results_dir: "results/mnist/three_phases"

experiments:
  mnist_8:
    data:
      size: 8
      batch_size: 128
      mnist_mean: 0.1307
      mnist_var: 0.3081
      train_val_split: 0.8

    model:
      latent_dim: 10
      hidden_dim: 20

    phase_1:
      enabled: true
      num_epochs: 2          
      learning_rate: 1.0e-3  
      reg_param: 1.0e-2      
      checkpoint_subdir: "checkpoints_phase_1"

    phase_2:
      enabled: true
      num_epochs: 50         
      learning_rate: 1.0e-3  
      reg_param: 1.0e-4      
      sigma: 1.0e-2          
      in_channels: 1
      kernel_size: 3
      hidden_channels: 2
      n_flows: 5
      checkpoint_subdir: "checkpoints_phase_2"

    phase_3:
      enabled: false
      num_epochs: 0
      learning_rate: 1.0e-3
      checkpoint_subdir: "checkpoints_phase_3"
      # add extra hyperparameters when you implement phase 3

  mnist_16:
    data:
      size: 16
      batch_size: 128
      mnist_mean: 0.1307
      mnist_var: 0.3081
      train_val_split: 0.8

    model:
      latent_dim: 10

    phase_1:
      enabled: true
      num_epochs: 2
      learning_rate: 1.0e-3
      reg_param: 1.0e-2
      checkpoint_subdir: "checkpoints_phase_1"

    phase_2:
      enabled: true
      num_epochs: 50
      learning_rate: 1.0e-3
      reg_param: 1.0e-4
      sigma: 1.0e-2
      in_channels: 1
      kernel_size: 3
      hidden_channels: 2
      n_flows: 5
      checkpoint_subdir: "checkpoints_phase_2"

    phase_3:
      enabled: false
      num_epochs: 0
      learning_rate: 1.0e-3
      checkpoint_subdir: "checkpoints_phase_3"
