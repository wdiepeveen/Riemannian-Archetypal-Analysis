data:
  size: 32
  batch_size: 128
  mnist_mean: 0.1307
  mnist_var: 0.3081
  train_val_split: 0.8

nflow:
  enabled: true
  num_epochs: 50         
  learning_rate: 1.0e-3
  kernel_size: 3
  hidden_channels: 64
  n_flows: 3
  n_scales: 3
  checkpoint_subdir: "checkpoints_nflow"

starflow:
  enabled: true
  reg_param: 1.
  n_archetypes: 
    digit_1: 10
    digit_2: 20
    digit_3: 20
    digit_4: 20
    digit_5: 20
    digit_6: 20
    digit_7: 20
    digit_8: 20
    digit_9: 20
    digit_0: 20
